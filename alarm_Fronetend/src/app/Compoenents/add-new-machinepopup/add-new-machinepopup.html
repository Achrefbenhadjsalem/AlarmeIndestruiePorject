<!-- INDUSTRIAL POPUP OVERLAY — Ajouter une Machine -->
<div class="overlay" (click)="onClose()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div>
          <h2 class="modal-title">Nouvelle Machine</h2>
          <p class="modal-subtitle">Remplissez les informations de l'équipement</p>
        </div>
      </div>
      <button class="close-btn" id="btn-close-add" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Désignation <span class="req">*</span></label>
          <input id="input-machine-name" type="text" class="form-control" [(ngModel)]="newMachine.name" placeholder="Ex: Extrudeuse Alpha" />
        </div>
        <div class="form-group">
          <label>Code Machine <span class="req">*</span></label>
          <input id="input-machine-code" type="text" class="form-control" [(ngModel)]="newMachine.code" placeholder="Ex: EXT-01" />
        </div>
        <div class="form-group">
          <label>Type d'équipement</label>
          <input type="text" class="form-control" [(ngModel)]="newMachine.type" placeholder="Ex: Moulage, Pression..." />
        </div>
        <div class="form-group">
          <label>Emplacement</label>
          <input type="text" class="form-control" [(ngModel)]="newMachine.location" placeholder="Ex: Atelier Nord" />
        </div>
        <div class="form-group">
          <label>Protocole de Communication</label>
          <select class="form-control" [(ngModel)]="newMachine.protocol">
            <option value="">Sélectionner un protocole</option>
            <option value="Modbus TCP">Modbus TCP</option>
            <option value="OPC UA">OPC UA</option>
            <option value="S7">S7 (Siemens)</option>
            <option value="MQTT">MQTT</option>
            <option value="EtherNet/IP">EtherNet/IP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Adresse IP</label>
          <input type="text" class="form-control mono" [(ngModel)]="newMachine.ipAddress" placeholder="192.168.x.x" />
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle-label">Machine active dès la création</label>
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="newMachine.isActive" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="onClose()">Annuler</button>
      <button class="btn btn-primary" id="btn-save-machine" (click)="onSave()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Enregistrer
      </button>
    </div>

  </div>
</div>
