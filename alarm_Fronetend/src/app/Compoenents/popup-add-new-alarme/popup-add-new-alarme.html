<!-- ADD ALARM POPUP -->
<div class="overlay" (click)="onClose()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon modal-icon-alarm">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div>
          <h2 class="modal-title">Nouvelle Alarme</h2>
          <p class="modal-subtitle">Configurer une nouvelle alarme industrielle</p>
        </div>
      </div>
      <button class="close-btn" id="btn-close-add-alarm" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Code Alarme <span class="req">*</span></label>
          <input id="input-alarm-code" type="text" class="form-control mono" [(ngModel)]="newAlarm.code" placeholder="Ex: ALM-001" />
        </div>
        <div class="form-group">
          <label>ID Machine liée</label>
          <input type="number" class="form-control" [(ngModel)]="machineId" placeholder="Ex: 1" />
        </div>
      </div>

      <div class="form-group">
        <label>Message / Description</label>
        <textarea class="form-control" rows="3" [(ngModel)]="newAlarm.message" placeholder="Décrire le défaut ou l'événement..."></textarea>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Priorité</label>
          <select class="form-control" [(ngModel)]="newAlarm.priority">
            <option *ngFor="let p of priorityOptions" [value]="p">{{ p }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Statut Initial</label>
          <select class="form-control" [(ngModel)]="newAlarm.status">
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle-label">Alarme active dès la création</label>
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="newAlarm.isActive" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="onClose()">Annuler</button>
      <button class="btn btn-alarm-save" id="btn-save-alarm" (click)="onSave()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Créer l'Alarme
      </button>
    </div>

  </div>
</div>
