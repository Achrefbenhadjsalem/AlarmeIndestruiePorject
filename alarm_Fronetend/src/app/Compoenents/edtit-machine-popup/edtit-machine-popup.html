<!-- INDUSTRIAL POPUP OVERLAY — Modifier une Machine -->
<div class="overlay" (click)="onClose()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon modal-icon-edit">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div>
          <h2 class="modal-title">Modifier la Machine</h2>
          <p class="modal-subtitle">{{ editedMachine?.code }} — {{ editedMachine?.name }}</p>
        </div>
      </div>
      <button class="close-btn" id="btn-close-edit" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body" *ngIf="editedMachine">
      <div class="form-grid">
        <div class="form-group">
          <label>Désignation <span class="req">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="editedMachine.name" />
        </div>
        <div class="form-group">
          <label>Code Machine <span class="req">*</span></label>
          <input type="text" class="form-control mono" [(ngModel)]="editedMachine.code" />
        </div>
        <div class="form-group">
          <label>Type d'équipement</label>
          <input type="text" class="form-control" [(ngModel)]="editedMachine.type" />
        </div>
        <div class="form-group">
          <label>Emplacement</label>
          <input type="text" class="form-control" [(ngModel)]="editedMachine.location" />
        </div>
        <div class="form-group">
          <label>Protocole de Communication</label>
          <select class="form-control" [(ngModel)]="editedMachine.protocol">
            <option value="">Sélectionner un protocole</option>
            <option value="Modbus TCP">Modbus TCP</option>
            <option value="OPC UA">OPC UA</option>
            <option value="S7">S7 (Siemens)</option>
            <option value="MQTT">MQTT</option>
            <option value="EtherNet/IP">EtherNet/IP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Adresse IP</label>
          <input type="text" class="form-control mono" [(ngModel)]="editedMachine.ipAddress" placeholder="192.168.x.x" />
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle-label">Machine active</label>
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="editedMachine.isActive" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="onClose()">Annuler</button>
      <button class="btn btn-primary" id="btn-update-machine" (click)="onSave()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Sauvegarder
      </button>
    </div>

  </div>
</div>
