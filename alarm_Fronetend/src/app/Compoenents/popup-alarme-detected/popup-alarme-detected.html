<div class="toast-container">
  <div
    *ngFor="let alarm of visibleAlarms"
    class="toast-card"
    [@toastAnimation]
    [style.border-left-color]="getPriorityColor(alarm.priority)"
  >
    <!-- Barre auto-dismiss -->
    <div class="toast-progress">
      <div class="toast-progress-fill"></div>
    </div>

    <!-- Header -->
    <div class="toast-header">
      <span class="toast-status-dot"></span>
      <span class="toast-title">Alarme système</span>
      <span class="toast-id">{{ alarm.code || 'ALM-????' }}</span>
      <button class="toast-close" (click)="dismiss(alarm)" title="Fermer">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"
             stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round">
          <line x1="1" y1="1" x2="11" y2="11"/>
          <line x1="11" y1="1" x2="1" y2="11"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="toast-body">

      <!-- Machine -->
      <div class="toast-machine-name">
        {{ alarm.machine?.name || 'Machine inconnue' }}
      </div>

      <!-- Message -->
      <div class="toast-message">{{ alarm.message }}</div>

      <!-- Métriques compactes -->
      <div class="toast-metrics">
        <div class="toast-metric">
          <span class="metric-label">Priorité</span>
          <span class="metric-value"
                [style.color]="getPriorityColor(alarm.priority)">
            {{ alarm.priority }}
          </span>
        </div>
        <div class="toast-metric">
          <span class="metric-label">Code</span>
          <span class="metric-value">{{ alarm.code || '—' }}</span>
        </div>
        <div class="toast-metric">
          <span class="metric-label">Heure</span>
          <span class="metric-value">{{ alarm.createdAt | date:'HH:mm:ss' }}</span>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="toast-footer">
      <span class="toast-timestamp">
        {{ alarm.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}
      </span>
      <button class="toast-ack-btn" (click)="dismiss(alarm)">
        Acquitter
      </button>
    </div>

  </div>
</div>
