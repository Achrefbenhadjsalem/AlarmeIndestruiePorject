<div class="toast-container">
  <div *ngFor="let alarm of visibleAlarms" 
       class="toast-card" 
       [@toastAnimation]
       [ngStyle]="{'border-left-color': getPriorityColor(alarm.priority)}">
    
    <div class="toast-header">
      <div class="toast-icon" [ngStyle]="{'color': getPriorityColor(alarm.priority)}">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="toast-title">
        Nouvelle Alarme Détectée
      </div>
      <button class="toast-close" (click)="dismiss(alarm)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="toast-body">
      <div class="alarm-detail">
        <span class="label">Code:</span> <span class="value">{{alarm.code}}</span>
      </div>
      <div class="alarm-detail">
        <span class="label">Message:</span> <span class="value">{{alarm.message}}</span>
      </div>
      <div class="alarm-detail">
        <span class="label">Priorité:</span> 
        <span class="value badge-priority" [ngStyle]="{'background-color': getPriorityColor(alarm.priority) + '20', 'color': getPriorityColor(alarm.priority)}">
          {{alarm.priority}}
        </span>
      </div>
    </div>
    
  </div>
</div>
