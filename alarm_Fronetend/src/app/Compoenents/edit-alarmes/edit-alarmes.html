<!-- EDIT ALARM POPUP -->
<div class="overlay" (click)="onClose()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon modal-icon-edit">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div>
          <h2 class="modal-title">Modifier l'Alarme</h2>
          <p class="modal-subtitle" *ngIf="edited">{{ edited.code }}</p>
        </div>
      </div>
      <button class="close-btn" id="btn-close-edit-alarm" (click)="onClose()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body" *ngIf="edited">
      <div class="form-grid">
        <div class="form-group">
          <label>Code Alarme <span class="req">*</span></label>
          <input type="text" class="form-control mono" [(ngModel)]="edited.code" />
        </div>
        <div class="form-group">
          <label>Machine ID</label>
          <input type="number" class="form-control" [(ngModel)]="edited.machine_id" />
        </div>
      </div>

      <div class="form-group">
        <label>Message / Description</label>
        <textarea class="form-control" rows="3" [(ngModel)]="edited.message"></textarea>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Priorité</label>
          <select class="form-control" [(ngModel)]="edited.priority">
            <option *ngFor="let p of priorityOptions" [value]="p">{{ p }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Statut</label>
          <select class="form-control" [(ngModel)]="edited.status">
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>

      <div class="toggle-row">
        <label class="toggle-label">Alarme active</label>
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="edited.isActive" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" (click)="onClose()">Annuler</button>
      <button class="btn btn-primary" id="btn-update-alarm" (click)="onSave()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Sauvegarder
      </button>
    </div>

  </div>
</div>
